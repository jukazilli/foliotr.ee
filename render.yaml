services:
  - type: web
    name: foliotree-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @foliotree/domain build && pnpm --filter api prisma generate && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: WEB_ORIGIN
        sync: false
